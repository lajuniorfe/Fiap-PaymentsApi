apiVersion: apps/v1
kind: Deployment

metadata:
  name: payments-api
  labels:
    app: payments-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: payments-api

  template:
    metadata:
      labels:
        app: payments-api

    spec:
      containers:
        - name: payments-api
          image: lajunior/payments-api:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: payments-config
            - secretRef:
                name: payments-secret